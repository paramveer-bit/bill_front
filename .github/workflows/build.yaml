name: Build and Deploy to Docker Hub

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v2
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: paramveer01/bill_front:latest
          # --- ADDED BUILD ARGS HERE ---
          build-args: |
            NEXT_PUBLIC_BASEURL=${{ secrets.NEXT_PUBLIC_BASEURL }}
          no-cache: true # Forces fresh static generation
          # ------------------------------

      - name: Verify Pushed Image
        run: docker pull paramveer01/bill_front:latest
      # deploying to ec2 instance

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            sudo docker pull paramveer01/bill_front:latest
            sudo docker stop bill_front || true
            sudo docker rm bill_front || true
            sudo docker system prune -af
            sudo docker run -d --name bill_front -p 3000:3000 paramveer01/bill_front:latest
